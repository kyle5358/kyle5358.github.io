baseURL: "https://kyle5358.github.io/"
languageCode: zh-cn
title: Kyle's Blog
theme: PaperMod
params:
  profileMode:
    enabled: false
  # homeInfoParams:
  #   Title: "Hi there 👋"
  #   Content: "Welcome to Kyle's Blog"
  math: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowPostNavLinks: true
  disableSpecial1stPost: true

menu:
  main:
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 10

    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20

    - identifier: search
      name: Search
      url: /search/
      weight: 30

    - identifier: about
      name: About
      url: /about/
      weight: 40

taxonomies:
  tag: tags
  category: categories

outputs:
  home:
    - HTML
    - RSS
    - JSON

fuseOpts:
  isCaseSensitive: false
  shouldSort: true
  location: 0
  distance: 1000
  threshold: 0.4
  minMatchCharLength: 0
  keys: ["title", "permalink", "summary", "content"]